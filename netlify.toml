[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache immutable, content-hashed build assets (JS/CSS/images) so repeat
# visits don't re-download them. HTML and the service worker must stay fresh.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Production backend API base URL (must end with /api — the frontend calls
  # paths like /auth/login, /users/me, so the base must include the /api prefix).
  # Override this in the Netlify dashboard (Site settings → Environment variables)
  # if your Render service name differs.
  VITE_API_URL = "https://home-interior-backend.onrender.com/api"
