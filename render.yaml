# Render deployment configuration
# Deploys ONLY the backend service from the server/ directory.
#
# IMPORTANT: The live backend is served at home-interior-backend.onrender.com
# (verified). The service name MUST match that subdomain so `render deploy`
# updates the correct service. If this name drifts from the live subdomain,
# a second, orphaned service gets created and the public site stops receiving
# deploys. The database instance name below is independent of the service name.

services:
  - type: web
    name: home-interior-backend
    runtime: node
    rootDir: server
    # `prisma db push` is REQUIRED: the live DB had drifted from schema.prisma
    # (the `projects` table was missing the `tags`/`services`/`media_settings`
    # columns added by later migrations, because no migrate step ever ran).
    # Without this, prisma.project.findMany() throws P2022 and /content/projects
    # + /content/homepage 500. `db push` adds the missing columns (additive, no
    # data loss) so the schema matches schema.prisma on every deploy.
    buildCommand: npm install && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hok-interior-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://homy-comfy.netlify.app
      - key: SEED_ADMIN_EMAIL
        value: admin@hokinterior.com
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
